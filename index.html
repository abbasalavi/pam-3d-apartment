<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pam's Apartment</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #info {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      pointer-events: none;
      text-align: center;
    }
    #loading {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #2a1f1a;
      color: #e8c9a0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      z-index: 100;
      font-family: 'Georgia', serif;
    }
  </style>
</head>
<body>
  <div id="loading">Loading Pam's Apartment...</div>
  <div id="info">WASD to move · Mouse to look around · 🌅</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    // ── Scene Setup ──
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe8c9a0); // warm golden

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(4, 2, 6);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // ── Controls ──
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.maxPolarAngle = Math.PI / 2.1;
    controls.minDistance = 1.5;
    controls.maxDistance = 10;

    // ── Lights ──
    const ambientLight = new THREE.AmbientLight(0xffeedd, 0.3);
    scene.add(ambientLight);

    // Golden hour sun
    const sunLight = new THREE.DirectionalLight(0xff9944, 2.0);
    sunLight.position.set(-5, 8, 5);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 1024;
    sunLight.shadow.mapSize.height = 1024;
    scene.add(sunLight);

    const fillLight = new THREE.DirectionalLight(0x88aaff, 0.3);
    fillLight.position.set(3, 2, -3);
    scene.add(fillLight);

    // ── Floor (Hardwood) ──
    const floorGeometry = new THREE.PlaneGeometry(10, 10);
    const floorMaterial = new THREE.MeshStandardMaterial({
      color: 0x8b6b4a,
      roughness: 0.7,
      metalness: 0.1,
    });
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // ── Walls ──
    const wallMat = new THREE.MeshStandardMaterial({ color: 0xf5eee6, roughness: 0.9 });

    // Back wall
    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 4), wallMat);
    backWall.position.set(0, 2, -5);
    scene.add(backWall);

    // Left wall
    const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 4), wallMat);
    leftWall.position.set(-5, 2, 0);
    leftWall.rotation.y = Math.PI / 2;
    scene.add(leftWall);

    // ── West-facing Windows ──
    const windowFrameMat = new THREE.MeshStandardMaterial({ color: 0xd4a574, roughness: 0.6 });
    const glassMat = new THREE.MeshPhysicalMaterial({
      color: 0x88ccff,
      transparent: true,
      opacity: 0.3,
      roughness: 0.1,
      metalness: 0,
    });

    // Back wall has windows
    for (let i = -2; i <= 2; i += 2) {
      const frame = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.5, 0.1), windowFrameMat);
      frame.position.set(i, 2, -4.94);
      scene.add(frame);

      const glass = new THREE.Mesh(new THREE.PlaneGeometry(1.3, 2.3), glassMat);
      glass.position.set(i, 2, -4.95);
      scene.add(glass);
    }

    // ── Dark Green Couch ──
    const couchMat = new THREE.MeshStandardMaterial({ color: 0x2d5a3d, roughness: 0.8 });
    const cushionMat = new THREE.MeshStandardMaterial({ color: 0x3a6b4a, roughness: 0.9 });

    // Base
    const couchBase = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.8, 1.0), couchMat);
    couchBase.position.set(0, 0.4, 1.5);
    couchBase.castShadow = true;
    couchBase.receiveShadow = true;
    scene.add(couchBase);

    // Back
    const couchBack = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.8, 0.3), couchMat);
    couchBack.position.set(0, 0.8, 2.0);
    couchBack.castShadow = true;
    scene.add(couchBack);

    // Armrests
    for (let x of [-1.5, 1.5]) {
      const arm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 1.0), couchMat);
      arm.position.set(x, 0.65, 1.5);
      arm.castShadow = true;
      scene.add(arm);
    }

    // Seat cushions
    for (let x of [-0.7, 0.7]) {
      const cushion = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.2, 0.7), cushionMat);
      cushion.position.set(x, 0.9, 1.5);
      cushion.receiveShadow = true;
      scene.add(cushion);
    }

    // ── Coffee Table ──
    const tableMat = new THREE.MeshStandardMaterial({ color: 0x5c3a1e, roughness: 0.7 });
    const tableTop = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.1, 0.8), tableMat);
    tableTop.position.set(1.5, 0.55, 0.5);
    tableTop.castShadow = true;
    scene.add(tableTop);
    // Legs
    for (let x of [-0.5, 0.5]) {
      for (let z of [-0.3, 0.3]) {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.5), tableMat);
        leg.position.set(1.5 + x, 0.25, 0.5 + z);
        scene.add(leg);
      }
    }

    // ── Aquarium (the Borg 🦐) ──
    const tankMat = new THREE.MeshPhysicalMaterial({
      color: 0x88ddff,
      transparent: true,
      opacity: 0.15,
      roughness: 0,
      metalness: 0,
    });
    const tankFrame = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 0.5), tankMat);
    tankFrame.position.set(-2.5, 0.5, 1.0);
    scene.add(tankFrame);
    // Green plants inside
    const plantMat = new THREE.MeshStandardMaterial({ color: 0x2d8a3d });
    const plant = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.15, 0.4, 6), plantMat);
    plant.position.set(-2.5, 0.5, 1.0);
    scene.add(plant);
    // Tiny red shrimp (the Borg)
    const shrimpMat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
    for (let i = 0; i < 5; i++) {
      const shrimp = new THREE.Mesh(new THREE.SphereGeometry(0.02, 4, 4), shrimpMat);
      shrimp.position.set(
        -2.5 + (Math.random() - 0.5) * 0.4,
        0.4 + Math.random() * 0.3,
        1.0 + (Math.random() - 0.5) * 0.3
      );
      scene.add(shrimp);
    }

    // ── Pam's Avatar (placeholder) ──
    const avatarGroup = new THREE.Group();
    avatarGroup.position.set(0, 0.9, 1.0);

    // Body (simple dress/sweater)
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd4a574, roughness: 0.7 });
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.3, 0.7, 8), bodyMat);
    body.position.y = 0.35;
    body.castShadow = true;
    avatarGroup.add(body);

    // Head
    const headMat = new THREE.MeshStandardMaterial({ color: 0xf0d5b0, roughness: 0.5 });
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 12), headMat);
    head.position.y = 0.85;
    head.castShadow = true;
    avatarGroup.add(head);

    // Hair
    const hairMat = new THREE.MeshStandardMaterial({ color: 0x4a3520, roughness: 0.8 });
    const hair = new THREE.Mesh(new THREE.SphereGeometry(0.19, 12, 12), hairMat);
    hair.position.y = 0.88;
    hair.scale.set(1, 0.7, 1.1);
    avatarGroup.add(hair);

    // Legs
    const legMat = new THREE.MeshStandardMaterial({ color: 0xf0d5b0, roughness: 0.7 });
    for (let x of [-0.1, 0.1]) {
      const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.4, 6), legMat);
      leg.position.set(x, 0.0, 0);
      avatarGroup.add(leg);
    }

    scene.add(avatarGroup);

    // ── Warm golden particles (dust motes in sunbeams) ──
    const particleGeo = new THREE.BufferGeometry();
    const particleCount = 300;
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount * 3; i++) {
      positions[i] = (Math.random() - 0.5) * 8;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({
      color: 0xffdd88,
      size: 0.02,
      transparent: true,
      opacity: 0.4,
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    particles.position.y = 2;
    scene.add(particles);

    // ── Window glow ──
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0xffaa44,
      transparent: true,
      opacity: 0.1,
    });
    for (let i = -2; i <= 2; i += 2) {
      const glow = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 2.8), glowMat);
      glow.position.set(i, 2, -4.8);
      scene.add(glow);
    }

    // ── Loading done ──
    document.getElementById('loading').style.display = 'none';

    // ── Animation ──
    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      // Gentle particle drift
      const pos = particles.geometry.attributes.position.array;
      for (let i = 0; i < pos.length; i += 3) {
        pos[i+1] += Math.sin(time + i) * 0.0005;
      }
      particles.geometry.attributes.position.needsUpdate = true;

      // Avatar subtle sway
      avatarGroup.rotation.y = Math.sin(time * 0.5) * 0.05;

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // ── Resize ──
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
