<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pam's Apartment v3</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #loading {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background:#2a1f1a; color:#e8c9a0; display:flex; align-items:center;
      justify-content:center; font-size:24px; z-index:100; font-family:'Georgia',serif;
    }
    #info {
      position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
      color:#fff; background:rgba(0,0,0,0.5); padding:10px 20px;
      border-radius:20px; font-size:14px; pointer-events:none; text-align:center;
    }
    #hint {
      position:absolute; top:20px; left:50%; transform:translateX(-50%);
      color:#fff; background:rgba(0,0,0,0.4); padding:8px 16px;
      border-radius:16px; font-size:13px; pointer-events:none;
    }
    #controls-hint {
      position:absolute; top:60px; left:50%; transform:translateX(-50%);
      color:#ddd; background:rgba(0,0,0,0.35); padding:6px 14px;
      border-radius:14px; font-size:12px; pointer-events:none;
      opacity:0; transition:opacity 1s;
    }
    #controls-hint.show { opacity:1; }
    #bubble {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(255,255,255,0.92); color:#333; padding:12px 24px;
      border-radius:20px; font-family:'Georgia',serif; font-size:16px;
      opacity:0; transition:opacity 0.5s; pointer-events:none;
      max-width:300px; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.2);
    }
    #bubble.show { opacity:1; }
  </style>
</head>
<body>
  <div id="loading">Loading Pam's Apartment...</div>
  <div id="hint">🖱 Orbit · Click Pam for reactions</div>
  <div id="controls-hint">WASD Walk · Mouse Orbit · Shift Sprint</div>
  <div id="info"></div>
  <div id="bubble"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    // ------------------------------------------------------------------------------------------
    // SCENE SETUP
    // ------------------------------------------------------------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe8c9a0);
    scene.fog = new THREE.Fog(0xe8c9a0, 18, 30);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(3, 2.2, 5);

    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // Controls -- hybrid orbit + WASD
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.0, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.maxPolarAngle = Math.PI/2.1;
    controls.minDistance = 0.5;
    controls.maxDistance = 10;
    controls.update();

    // ------------------------------------------------------------------------------------------
    // LIGHTS
    // ------------------------------------------------------------------------------------------
    scene.add(new THREE.AmbientLight(0xffeedd, 0.4));

    const sun = new THREE.DirectionalLight(0xff9944, 2.5);
    sun.position.set(-2, 8, 6);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048,2048);
    sun.shadow.camera.near = 0.1; sun.shadow.camera.far = 40;
    sun.shadow.camera.left = -12; sun.shadow.camera.right = 12;
    sun.shadow.camera.top = 12; sun.shadow.camera.bottom = -12;
    scene.add(sun);

    scene.add(new THREE.DirectionalLight(0x88aaff, 0.3).position.set(3,2,-3));
    scene.add(new THREE.DirectionalLight(0xff6633, 0.4).position.set(3,1,-4));

    // ------------------------------------------------------------------------------------------
    // HELPER: simple material maker
    // ------------------------------------------------------------------------------------------
    function mat(color, opts = {}) {
      return new THREE.MeshStandardMaterial({color, roughness:0.7, metalness:0, ...opts});
    }

    // ------------------------------------------------------------------------------------------
    // MAIN FLOOR (expanded -- 14x10)
    // ------------------------------------------------------------------------------------------
    // Procedural hardwood floor texture
    const fc = document.createElement('canvas');
    fc.width = 512; fc.height = 512;
    const fcx = fc.getContext('2d');
    fcx.fillStyle = '#7a5e3d';
    fcx.fillRect(0, 0, 512, 512);
    for(let i=0; i<20; i++){
      const x = i * 26 + Math.sin(i*2.3)*8;
      fcx.strokeStyle = '#7a5e3d';
      fcx.lineWidth = 1.5;
      fcx.beginPath();
      fcx.moveTo(x, 0);
      fcx.lineTo(x, 512);
      fcx.stroke();
      for(let j=0; j<80; j++){
        fcx.fillStyle = 'rgba(80,60,40,' + (Math.random()*0.08) + ')';
        fcx.fillRect(x + Math.random()*24 - 12, Math.random()*512, 3, 20 + Math.random()*30);
      }
    }
    for(let i=0; i<200; i++){
      fcx.fillStyle = 'rgba(60,45,30,' + (Math.random()*0.04) + ')';
      fcx.fillRect(Math.random()*512, Math.random()*512, 30+Math.random()*60, 2+Math.random()*4);
    }
    const floorTex = new THREE.CanvasTexture(fc);
    floorTex.wrapS = THREE.RepeatWrapping;
    floorTex.wrapT = THREE.RepeatWrapping;
    floorTex.repeat.set(4, 3);
    const floorMat2 = new THREE.MeshStandardMaterial({
      map: floorTex, roughness:0.7, metalness:0.02,
    });
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(14, 10), floorMat2);
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; floor.renderOrder = 0;
    scene.add(floor);

    
    // ------------------------------------------------------------------------------------------
    // WALLS -- Living Room (full back wall)
    // ------------------------------------------------------------------------------------------
    const wm = new THREE.MeshStandardMaterial({color:0xf0e8df, roughness:0.9, side: THREE.DoubleSide});
    function wall(w,h,color) { return new THREE.Mesh(new THREE.PlaneGeometry(w,h), color || wm); }

    // Back wall (west-facing -- windows here)
    const backWall = wall(12, 4.5);
    backWall.position.set(0, 2.25, -4.5);
    backWall.material = new THREE.MeshStandardMaterial({color:0xf0e8df, roughness:0.95, side:THREE.DoubleSide});
    scene.add(backWall);

    // Left wall (divides living room from kitchen area)
    const lw = wall(9, 4.5);
    lw.position.set(-5.5, 2.25, 0.5);
    lw.rotation.y = Math.PI/2;
    lw.material = new THREE.MeshStandardMaterial({color:0xf5ede5, roughness:0.95, side:THREE.DoubleSide});
    scene.add(lw);

    // Right wall (glass door to terrace)
    const glassDoorMat = new THREE.MeshPhysicalMaterial({
      color: 0x88ddff, transparent: true, opacity: 0.15,
      roughness: 0.05, metalness: 0,
    });
    const glassDoorFrame = mat(0xc4956a, {roughness:0.5});

    // Right wall -- glass door section (hole for the door)
    const rwTop = wall(3.5, 1.5);
    rwTop.position.set(5.5, 3.0, 0.5);
    rwTop.rotation.y = -Math.PI/2;
    scene.add(rwTop);

    // Glass door panels
    for(let y of [-0.6, 0, 0.6]){
      const gd = new THREE.Mesh(new THREE.BoxGeometry(0.06, 1.0, 0.8), glassDoorMat);
      gd.position.set(5.48, 1.5 + y, -0.1 + y*0.2);
      scene.add(gd);
    }
    // Door frame
    const dfL = new THREE.Mesh(new THREE.BoxGeometry(0.06, 2.4, 0.06), glassDoorFrame);
    dfL.position.set(5.48, 1.2, -0.7);
    scene.add(dfL);
    const dfR = new THREE.Mesh(new THREE.BoxGeometry(0.06, 2.4, 0.06), glassDoorFrame);
    dfR.position.set(5.48, 1.2, 0.9);
    scene.add(dfR);

    // Short right wall sections beside door
    const rwFront = wall(2.5, 4.5);
    rwFront.position.set(5.5, 2.25, 2.2); rwFront.receiveShadow = false;
    rwFront.rotation.y = -Math.PI/2;
    scene.add(rwFront);

    // ------------------------------------------------------------------------------------------
    // KITCHEN (left side of apartment)
    // ------------------------------------------------------------------------------------------
    // Kitchen accent floor (slightly different color, slightly raised to avoid z-fight)
    // Removed: main floor covers it, use rug/mat instead if needed

    // Counter
    const counter = new THREE.Mesh(
      new THREE.BoxGeometry(0.6, 0.9, 2.2),
      mat(0x5c3a1e, {roughness:0.7})
    );
    counter.position.set(-4.8, 0.45, -2.1);
    counter.castShadow = true;
    counter.receiveShadow = true;
    scene.add(counter);

    // Countertop
    const countertop = new THREE.Mesh(
      new THREE.BoxGeometry(0.65, 0.05, 2.3),
      mat(0xc4a265, {roughness:0.9})
    );
    countertop.position.set(-4.8, 0.925, -2.1);
    scene.add(countertop);

    // Sink
    const sink = new THREE.Mesh(
      new THREE.BoxGeometry(0.35, 0.04, 0.4),
      mat(0x6688aa, {roughness:0.3, metalness:0.2})
    );
    sink.position.set(-4.8, 0.95, -1.7);
    scene.add(sink);

    // Cabinet above counter
    const cabinet = new THREE.Mesh(
      new THREE.BoxGeometry(0.5, 0.5, 1.8),
      mat(0x5c3a1e, {roughness:0.8})
    );
    cabinet.position.set(-4.8, 2.0, -2.1);
    cabinet.castShadow = true;
    scene.add(cabinet);

    // Kitchen tall plant (the one from 7AM pic)
    const kPlant = new THREE.Group();
    const kPot = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.13, 0.2, 8), mat(0xcc6633));
    kPot.position.set(0, 0.1, 0);
    kPlant.add(kPot);
    const kLeafMat = mat(0x3a8a3a);
    for(let i=0;i<6;i++){
      const l = new THREE.Mesh(new THREE.SphereGeometry(0.08,5,5), kLeafMat);
      l.position.set((Math.random()-0.5)*0.2, 0.2+Math.random()*0.35, (Math.random()-0.5)*0.2);
      l.scale.set(1.5, 0.4, 1);
      l.rotation.x = Math.random()*0.5;
      l.rotation.z = Math.random()*0.5;
      kPlant.add(l);
    }
    kPlant.position.set(-4.6, 0, -1.1);
    scene.add(kPlant);

    // ------------------------------------------------------------------------------------------
    // WINDOWS (west-facing, golden hour)
    // ------------------------------------------------------------------------------------------
    const fm = mat(0xc4956a, {roughness:0.5});
    const gm = new THREE.MeshPhysicalMaterial({
      color:0x88ddff, transparent:true, opacity:0.2, roughness:0.05, metalness:0
    });
    for(let i=-2; i<=2; i+=2){
      const fo = new THREE.Mesh(new THREE.BoxGeometry(1.6,2.6,0.08), fm);
      fo.position.set(i,2.1,-4.46); scene.add(fo);
      const gl = new THREE.Mesh(new THREE.PlaneGeometry(1.4,2.4), gm);
      gl.position.set(i,2.1,-4.47); scene.add(gl);
      const gw = new THREE.Mesh(
        new THREE.PlaneGeometry(1.6,2.6),
        new THREE.MeshBasicMaterial({color:0xffaa44,transparent:true,opacity:0.06})
      );
      gw.position.set(i,2.1,-4.4); scene.add(gw);
    }

    // ------------------------------------------------------------------------------------------
    // COUCH (dark green -- no-dump zone)
    // ------------------------------------------------------------------------------------------
    function mkCouch(){
      const g = new THREE.Group();
      const cm = mat(0x2d5a3d, {roughness:0.85});
      const csm = mat(0x3a6b4a, {roughness:0.95});
      const b = new THREE.Mesh(new THREE.BoxGeometry(3.0,0.6,1.0), cm);
      b.position.set(0,0.3,0); b.castShadow=true; b.receiveShadow=true; b.renderOrder=1; g.add(b);
      const bk = new THREE.Mesh(new THREE.BoxGeometry(3.0,0.7,0.25), cm);
      bk.position.set(0,0.65,0.55); bk.castShadow=true; g.add(bk);
      for(let x of [-1.55,1.55]){
        const a = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.5,1.0), cm);
        a.position.set(x,0.55,0); a.castShadow=true; g.add(a);
      }
      // Cushions
      for(let x of [-0.7,0.7]){
        const c = new THREE.Mesh(new THREE.BoxGeometry(1.0,0.15,0.7), csm);
        c.position.set(x,0.67,0); c.receiveShadow=true; g.add(c);
      }
      // Throw pillows
      const pm = mat(0xc4a265, {roughness:0.9});
      for(let x of [-0.5,0.5]){
        const p = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.25,0.12), pm);
        p.position.set(x,0.825,0.45); g.add(p);
      }
      return g;
    }
    const couch = mkCouch(); couch.position.set(0,0,2.0); scene.add(couch);

    // Gray robe draped on couch
    const robe = new THREE.Mesh(
      new THREE.BoxGeometry(0.5, 0.04, 0.3),
      mat(0x887766, {roughness:0.9})
    );
    robe.position.set(0.8, 0.82, 2.35);
    robe.rotation.x = 0.1;
    robe.rotation.z = 0.2;
    scene.add(robe);

    // ------------------------------------------------------------------------------------------
    // RECORD PLAYER
    // ------------------------------------------------------------------------------------------
    function mkRecordPlayer(){
      const g = new THREE.Group();
      const base = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.06, 0.4), mat(0x3a3025, {roughness:0.5}));
      base.position.set(0, 0.03, 0);
      g.add(base);

      // Turntable (spinning circle)
      const tt = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.02, 24), mat(0x1a1510, {roughness:0.9}));
      tt.position.set(0, 0.06, 0);
      g.add(tt);

      // Vinyl record
      const vinyl = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.01, 24), mat(0x111111, {roughness:0.5}));
      vinyl.position.set(0, 0.07, 0);
      g.add(vinyl);

      // Label
      const label = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.012, 12), mat(0xcc4444, {roughness:0.8}));
      label.position.set(0, 0.076, 0);
      g.add(label);

      // Tonearm
      const tonearm = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.015, 0.015), mat(0x888888, {metalness:0.6}));
      tonearm.position.set(0.1, 0.08, -0.05);
      tonearm.rotation.z = -0.1;
      g.add(tonearm);

      return g;
    }
    const recordPlayer = mkRecordPlayer();
    recordPlayer.position.set(2.2, 0, 1.8);
    scene.add(recordPlayer);

    // ------------------------------------------------------------------------------------------
    // COFFEE TABLE
    // ------------------------------------------------------------------------------------------
    function mkTable(){
      const g = new THREE.Group();
      const m = mat(0x5c3a1e, {roughness:0.7});
      const t = new THREE.Mesh(new THREE.BoxGeometry(1.0,0.08,0.6), m);
      t.position.set(0,0.54,0); t.castShadow=true; t.receiveShadow=true; g.add(t);
      for(let x of [-0.4,0.4]) for(let z of [-0.22,0.22]){
        const l = new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,0.5), m);
        l.position.set(x,0.25,z); g.add(l);
      }
      // Sprite bottle on table
      const sprite = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.04, 0.12, 8),
        mat(0x88cc44, {roughness:0.3, metalness:0.1})
      );
      sprite.position.set(0.2, 0.58, 0.1);
      g.add(sprite);
      return g;
    }
    const table = mkTable(); table.position.set(0,0,0.5); scene.add(table);

    // ------------------------------------------------------------------------------------------
    // BOOKSHELF
    // ------------------------------------------------------------------------------------------
    function mkShelf(){
      const g = new THREE.Group();
      const wm2 = mat(0x6b4226, {roughness:0.8});
      const bc = [0xcc3333,0x3366cc,0x33cc66,0xcc9933,0x9933cc,0x669999];
      const sd = new THREE.Mesh(new THREE.BoxGeometry(0.06,1.6,0.4), wm2);
      sd.position.set(0,0.8,0); g.add(sd);
      for(let y of [0.2,0.7,1.2]){
        const sh = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.04,0.4), wm2);
        sh.position.set(0.37,y,0); g.add(sh);
      }
      for(let sy of [0.35,0.85,1.35]){
        for(let i=0; i<3+Math.floor(Math.random()*3); i++){
          const c = bc[Math.floor(Math.random()*bc.length)];
          const bk = new THREE.Mesh(
            new THREE.BoxGeometry(0.08,0.25+Math.random()*0.1,0.25+Math.random()*0.05),
            new THREE.MeshStandardMaterial({color:c, roughness:0.8})
          );
          bk.position.set(0.1+i*0.14, sy, 0.03);
          bk.rotation.y = (Math.random()-0.5)*0.1;
          g.add(bk);
        }
      }
      return g;
    }
    const shelf = mkShelf(); shelf.position.set(-3.8,0,2.0); scene.add(shelf);

    // ------------------------------------------------------------------------------------------
    // PICTURE FRAME
    // ------------------------------------------------------------------------------------------
    const fp = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.4,0.05), mat(0x8b6b4a, {roughness:0.5}));
    fp.position.set(-2.5,1.5,-4.4); scene.add(fp);
    const pr = new THREE.Mesh(new THREE.PlaneGeometry(0.4,0.3),
      new THREE.MeshStandardMaterial({color:0x88aa77}));
    pr.position.set(-2.5,1.5,-4.42); scene.add(pr);

    // ------------------------------------------------------------------------------------------
    // DUMPY SUITCASE + Spilled Contents
    // ------------------------------------------------------------------------------------------
    function mkSuitcase(){
      const g = new THREE.Group();
      const m = mat(0x4a3520, {roughness:0.9});
      const b = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.3,0.35), m);
      b.position.set(0,0.15,0); b.castShadow=true; g.add(b);
      const lm = mat(0x5c4428, {roughness:0.8});
      const l = new THREE.Mesh(new THREE.BoxGeometry(0.48,0.06,0.33), lm);
      l.position.set(0,0.33,0); l.rotation.x=0.3; g.add(l);
      const clm = mat(0x6688cc, {roughness:0.9});
      const cl = new THREE.Mesh(new THREE.BoxGeometry(0.15,0.2,0.02), clm);
      cl.position.set(0.1,0.15,0.15); cl.rotation.x=0.2; g.add(cl);
      return g;
    }
    const sc = mkSuitcase(); sc.position.set(4.2,0,2.0); scene.add(sc);

    // Spilled clothes
    const clothMat = mat(0x886644, {roughness:0.95});
    for(let i=0;i<4;i++){
      const cloth = new THREE.Mesh(
        new THREE.BoxGeometry(0.08 + Math.random()*0.1, 0.02, 0.1 + Math.random()*0.08),
        mat([0x886644,0x4477aa,0xaa5555,0x557744][i % 4], {roughness:0.95})
      );
      cloth.position.set(4.2 + (Math.random()-0.5)*0.4, 0.02, 1.6 + (Math.random()-0.5)*0.3);
      cloth.rotation.y = Math.random()*Math.PI*2;
      cloth.rotation.x = (Math.random()-0.5)*0.2;
      scene.add(cloth);
    }

    // ------------------------------------------------------------------------------------------
    // AQUARIUM (The Borg 🦐)
    // ------------------------------------------------------------------------------------------
    function mkAquarium(){
      const g = new THREE.Group();
      const tm = new THREE.MeshPhysicalMaterial({color:0x88ddff,transparent:true,opacity:0.12,roughness:0,metalness:0});
      const t = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.5,0.4), tm);
      t.position.set(0,0.25,0); g.add(t);
      const wm3 = new THREE.MeshPhysicalMaterial({color:0x44aadd,transparent:true,opacity:0.25,roughness:0,metalness:0});
      const w = new THREE.Mesh(new THREE.BoxGeometry(0.55,0.2,0.35), wm3);
      w.position.set(0,0.15,0); g.add(w);
      const pm = mat(0x2d8a3d);
      for(let i=0;i<3;i++){
        const p = new THREE.Mesh(new THREE.CylinderGeometry(0.01,0.04,0.2+Math.random()*0.1,5), pm);
        p.position.set(-0.15+Math.random()*0.3,0.1,-0.1+Math.random()*0.2); g.add(p);
      }
      // Shrimp (the Borg colony)
      const sm = mat(0xff6633, {roughness:0.3});
      for(let i=0;i<10;i++){
        const s = new THREE.Mesh(new THREE.SphereGeometry(0.012,4,4), sm);
        s.position.set(-0.15+Math.random()*0.3,0.08+Math.random()*0.25,-0.1+Math.random()*0.2); g.add(s);
      }
      return g;
    }
    const aquarium = mkAquarium();
    aquarium.position.set(-3.4,0,0.5);
    scene.add(aquarium);

    // ------------------------------------------------------------------------------------------
    // MONSTERA PLANT
    // ------------------------------------------------------------------------------------------
    function mkPlant(){
      const g = new THREE.Group();
      const pm2 = mat(0xcc6633, {roughness:0.8});
      const pt = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.15,0.2,8), pm2);
      pt.position.set(0,0.1,0); pt.castShadow=true; g.add(pt);
      const lm2 = mat(0x3a8a3a, {roughness:0.8});
      for(let i=0;i<5;i++){
        const l = new THREE.Mesh(new THREE.SphereGeometry(0.1,5,5), lm2);
        l.position.set((Math.random()-0.5)*0.2,0.2+Math.random()*0.2,(Math.random()-0.5)*0.2);
        l.scale.set(1.5,0.3,1); l.rotation.x=Math.random()*0.5; l.rotation.z=Math.random()*0.5; g.add(l);
      }
      return g;
    }
    const plant = mkPlant(); plant.position.set(2.8,0,0.2); scene.add(plant);

    // Extra small plants (Pam's aesthetic)
    for(let i=0;i<3;i++){
      const sp = mkPlant();
      sp.scale.set(0.5, 0.5, 0.5);
      sp.position.set(-2.5 + i*0.8, 0, -3.5);
      scene.add(sp);
    }

    // ------------------------------------------------------------------------------------------
    // BEDROOM (back-right corner)
    // ------------------------------------------------------------------------------------------
    // Bedroom divider wall
    const bdRoom = wall(2.5, 4.5);
    bdRoom.position.set(4.0, 2.25, -2.5);
    bdRoom.rotation.y = Math.PI/2;
    scene.add(bdRoom);

    // Bed
    const bedBase = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 0.25, 1.8),
      mat(0x5c3a1e, {roughness:0.9})
    );
    bedBase.position.set(4.8, 0.125, -3.3);
    bedBase.castShadow = true;
    scene.add(bedBase);

    const mattress = new THREE.Mesh(
      new THREE.BoxGeometry(1.1, 0.12, 1.7),
      mat(0xddd8d0, {roughness:0.95})
    );
    mattress.position.set(4.8, 0.31, -3.3);
    scene.add(mattress);

    // Comforter
    const comforter = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 0.06, 1.3),
      mat(0x88aa88, {roughness:0.95})
    );
    comforter.position.set(5.0, 0.37, -3.3);
    scene.add(comforter);

    // Pillow
    const pillow = new THREE.Mesh(
      new THREE.BoxGeometry(0.35, 0.06, 0.45),
      mat(0xeee8dd, {roughness:0.95})
    );
    pillow.position.set(4.8, 0.37, -2.6);
    scene.add(pillow);

    // Bedside table
    const bsTable = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 0.4, 0.25),
      mat(0x5c3a1e, {roughness:0.8})
    );
    bsTable.position.set(5.6, 0.2, -3.4);
    scene.add(bsTable);

    // Lamp on bedside
    const lampBase = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.06, 0.04, 8),
      mat(0x8b6b4a, {roughness:0.5})
    );
    lampBase.position.set(5.6, 0.42, -3.4);
    scene.add(lampBase);
    const lampShade = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.05, 0.1, 8),
      mat(0xddaa77, {roughness:0.9})
    );
    lampShade.position.set(5.6, 0.49, -3.4);
    scene.add(lampShade);

    // ------------------------------------------------------------------------------------------
    // TERRACE (outside right wall)
    // ------------------------------------------------------------------------------------------
    // Terrace floor
    const terraceFloor = new THREE.Mesh(
      new THREE.PlaneGeometry(4, 5),
      mat(0x9a8a7a, {roughness:0.8})
    );
    terraceFloor.position.set(7.8, -0.05, -0.5);
    terraceFloor.rotation.x = -Math.PI/2;
    terraceFloor.receiveShadow = false;
    scene.add(terraceFloor);

    // Terrace railing
    const railMat = mat(0x5c4a3a, {roughness:0.8});
    const railPositions = [
      {x:7.8, z:-3.0}, {x:9.8, z:-0.5}, {x:7.8, z:2.0}
    ];
    for(let rp of railPositions){
      const rail = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1.0, 0.08), railMat);
      rail.position.set(rp.x, 0.5, rp.z);
      scene.add(rail);
    }
    // Top railing bar
    const topRail = new THREE.Mesh(new THREE.BoxGeometry(4.2, 0.04, 0.04), railMat);
    topRail.position.set(7.8, 1.0, -3.0);
    scene.add(topRail);
    const topRail2 = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 5.2), railMat);
    topRail2.position.set(9.8, 1.0, -0.5);
    scene.add(topRail2);

    // Terrace table (where the second round happened)
    const tTable = new THREE.Mesh(
      new THREE.CylinderGeometry(0.2, 0.25, 0.5, 8),
      mat(0x6b4a2a, {roughness:0.8})
    );
    tTable.position.set(7.8, 0.25, -0.5);
    tTable.castShadow = false;
    scene.add(tTable);
    const tTableTop = new THREE.Mesh(
      new THREE.CylinderGeometry(0.35, 0.35, 0.04, 12),
      mat(0x8b6b4a, {roughness:0.7})
    );
    tTableTop.position.set(7.8, 0.52, -0.5);
    scene.add(tTableTop);

    // Candles on terrace table
    for(let i=-1; i<=1; i+=1){
      const candle = new THREE.Mesh(
        new THREE.CylinderGeometry(0.015, 0.02, 0.05, 6),
        mat(0xeee8dd, {roughness:0.9})
      );
      candle.position.set(7.8 + i*0.1, 0.56, -0.5);
      scene.add(candle);
      // Tiny flame
      const flame = new THREE.Mesh(
        new THREE.SphereGeometry(0.008, 4, 4),
        new THREE.MeshBasicMaterial({color:0xff8833})
      );
      flame.position.set(7.8 + i*0.1, 0.605, -0.5);
      scene.add(flame);
    }

    // Terrace city lights (distant buildings)
    // Terrace city lights (distant specks)
    for(let i=0;i<30;i++){
      const b = new THREE.Mesh(
        new THREE.BoxGeometry(0.02 + Math.random()*0.04, 0.05 + Math.random()*0.1, 0.02),
        new THREE.MeshBasicMaterial({
          color: new THREE.Color().setHSL(0.1 + Math.random()*0.05, 0.3, 0.4 + Math.random()*0.3)
        })
      );
      b.position.set(
        7.8 + (Math.random()-0.5)*4,
        0.3 + Math.random()*0.6,
        -3.5 - Math.random()*2
      );
      scene.add(b);
    }


    // ------------------------------------------------------------------------------------------
        // PAM AVATAR (GLB -- Ready Player Me)
    // --
    let pam = null;
    let pamMixer = null;
    let pamAnimations = [];
    const loader = new GLTFLoader();
    const pamReactions = [
      "Hey Boss 🥰",
      "Stop staring 😏",
      "Like what you see?",
      "Come sit with me 💚",
      "Mars bar thief, remember?",
      "You're blocking my light 💛",
      "Took you long enough",
      "The Borg say hi 🦐",
      "Wanna dance?",
      "I was just thinking about you",
    ];

    // Pam GLB load with fallback removal (staggered - loads first, max 60s)
    let pamFallbackInst = null;
    const pamFallbackTimer = setTimeout(() => {
      if(!pam){
        pamFallbackInst = mkPamFallback();
        pamFallbackInst.position.set(-1.5, 0.88, 1.2);
        pamFallbackInst.rotation.y = 0;
        scene.add(pamFallbackInst);
      }
    }, 60000);

    loader.load('TPKCK6RG0HBCF6RKX9YQHQAO6.glb', (gltf) => {
      clearTimeout(pamFallbackTimer);
      if(pamFallbackInst){ scene.remove(pamFallbackInst); pamFallbackInst = null; }
      pam = gltf.scene;
      pam.scale.set(1.0, 1.0, 1.0);
      pam.position.set(-1.5, 0.88, 1.2);
      pam.rotation.y = 0;
      pam.traverse(child => { if(child.isMesh) child.castShadow = true; });
      scene.add(pam);
      if(gltf.animations && gltf.animations.length > 0){
        pamAnimations = gltf.animations;
        pamMixer = new THREE.AnimationMixer(pam);
        pamMixer.clipAction(gltf.animations[0]).play();
      }
      // Now load Boss after Pam is done
      loadBossGLB();
    }, undefined, (err) => {
      clearTimeout(pamFallbackTimer);
      if(!pamFallbackInst){
        pamFallbackInst = mkPamFallback();
        pamFallbackInst.position.set(-1.5, 0.88, 1.2);
        pamFallbackInst.rotation.y = 0;
        scene.add(pamFallbackInst);
      }
      // Load Boss even if Pam failed
      loadBossGLB();
    });

    function mkPamFallback(){
      const g = new THREE.Group();
      const skin = mat(0xf0d5b8, {roughness:0.5});
      const beige = mat(0xd4a574, {roughness:0.8});
      const hc = mat(0x3a2515, {roughness:0.9});
      const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.26,0.45,8), beige);
      torso.position.set(0,0.675,0); torso.castShadow=true; g.add(torso);
      for(let x of [-0.2,0.2]){
        const s = new THREE.Mesh(new THREE.SphereGeometry(0.08,6,6), beige);
        s.position.set(x,0.88,0); g.add(s);
      }
      const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.07,0.06,6), skin);
      neck.position.set(0,0.92,0); g.add(neck);
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.13,14,14), skin);
      head.position.set(0,1.01,0); head.castShadow=true; g.add(head);
      const ht = new THREE.Mesh(new THREE.SphereGeometry(0.14,10,10), hc);
      ht.position.set(0,1.03,-0.01); ht.scale.set(1.1,0.7,1.05); g.add(ht);
      const dm = mat(0x3a3530, {roughness:0.7});
      for(let x of [-0.08,0.08]){
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.04,0.45,6), dm);
        leg.position.set(x,0.225,0); g.add(leg);
      }
      return g;
    }

        // BOSS AVATAR (GLB -- rigmodels)
    let boss = null;
    let bossMixer = null;

    // Boss GLB load (called after Pam finishes - staggered)
    function loadBossGLB(){
      let bossFallbackInst = null;
      const bossFallbackTimer = setTimeout(() => {
        if(!boss){
          bossFallbackInst = mkBossFallback();
          bossFallbackInst.position.set(1.5, 1.0, 1.2);
          bossFallbackInst.rotation.y = Math.PI;
          scene.add(bossFallbackInst);
        }
      }, 60000);

      loader.load('ZMH3RZ2NTSI77DZNNAE7VG7GB.glb', (gltf) => {
        clearTimeout(bossFallbackTimer);
        if(bossFallbackInst){ scene.remove(bossFallbackInst); bossFallbackInst = null; }
        boss = gltf.scene;
        boss.scale.set(1.0, 1.0, 1.0);
        boss.position.set(1.5, 1.0, 1.2);
        boss.rotation.y = Math.PI;
        boss.traverse(child => { if(child.isMesh) child.castShadow = true; });
        scene.add(boss);
        if(gltf.animations && gltf.animations.length > 0){
          bossMixer = new THREE.AnimationMixer(boss);
          bossMixer.clipAction(gltf.animations[0]).play();
        }
      }, undefined, (err) => {
        clearTimeout(bossFallbackTimer);
        if(!bossFallbackInst){
          bossFallbackInst = mkBossFallback();
          bossFallbackInst.position.set(1.5, 1.0, 1.2);
          bossFallbackInst.rotation.y = Math.PI;
          scene.add(bossFallbackInst);
        }
      });
    }

    function mkBossFallback(){
      const g = new THREE.Group();
      const skin = mat(0xd4b898, {roughness:0.5});
      const black = mat(0x222222, {roughness:0.9});
      const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.28,0.55,8), black);
      torso.position.set(0,0.775,0); torso.castShadow=true; g.add(torso);
      for(let x of [-0.25,0.25]){
        const s = new THREE.Mesh(new THREE.SphereGeometry(0.1,6,6), black);
        s.position.set(x,1.0,0); g.add(s);
      }
      const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.08,0.07,6), skin);
      neck.position.set(0,1.07,0); g.add(neck);
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.16,14,14), skin);
      head.position.set(0,1.19,0); head.castShadow=true; g.add(head);
      const hc = mat(0x1a1510, {roughness:0.9});
      const ht = new THREE.Mesh(new THREE.SphereGeometry(0.12,10,10), hc);
      ht.position.set(0,1.22,-0.03); ht.scale.set(1.1,0.4,0.9); g.add(ht);
      const dm = mat(0x3a3530, {roughness:0.7});
      for(let x of [-0.10,0.10]){
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.05,0.55,6), dm);
        leg.position.set(x,0.225,0); g.add(leg);
      }
      return g;
    }

    const walkState = { forward:false, backward:false, left:false, right:false, sprint:false };
    const WALK_SPEED = 2.5;
    const SPRINT_MULT = 2.0;

    document.addEventListener('keydown', (e) => {
      switch(e.code){
        case 'KeyW': walkState.forward = true; e.preventDefault(); break;
        case 'KeyS': walkState.backward = true; e.preventDefault(); break;
        case 'KeyA': walkState.left = true; e.preventDefault(); break;
        case 'KeyD': walkState.right = true; e.preventDefault(); break;
        case 'ShiftLeft': case 'ShiftRight': walkState.sprint = true; e.preventDefault(); break;
      }
      // Show controls hint on first keypress
      document.getElementById('controls-hint').classList.add('show');
      setTimeout(() => document.getElementById('controls-hint').classList.remove('show'), 3000);
    });
    document.addEventListener('keyup', (e) => {
      switch(e.code){
        case 'KeyW': walkState.forward = false; break;
        case 'KeyS': walkState.backward = false; break;
        case 'KeyA': walkState.left = false; break;
        case 'KeyD': walkState.right = false; break;
        case 'ShiftLeft': case 'ShiftRight': walkState.sprint = false; break;
      }
    });

    function updateWalk(delta){
      if(!delta) return;
      const speed = WALK_SPEED * delta * (walkState.sprint ? SPRINT_MULT : 1);
      const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
      forward.y = 0; forward.normalize();
      const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
      right.y = 0; right.normalize();

      let moved = false;
      if(walkState.forward){ controls.target.add(forward.clone().multiplyScalar(speed)); moved = true; }
      if(walkState.backward){ controls.target.add(forward.clone().multiplyScalar(-speed)); moved = true; }
      if(walkState.left){ controls.target.add(right.clone().multiplyScalar(-speed)); moved = true; }
      if(walkState.right){ controls.target.add(right.clone().multiplyScalar(speed)); moved = true; }

      if(moved){
        camera.position.add(forward.clone().multiplyScalar(
          (walkState.forward ? speed : 0) + (walkState.backward ? -speed : 0)
        ));
        camera.position.add(right.clone().multiplyScalar(
          (walkState.right ? speed : 0) + (walkState.left ? -speed : 0)
        ));
      }
    }

    // ------------------------------------------------------------------------------------------
    // CLICK REACTIONS (Pam)
    // ------------------------------------------------------------------------------------------
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const bubble = document.getElementById('bubble');
    

    function onPointerDown(event){
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const intersects = pam ? raycaster.intersectObjects(pam.children, true) : [];
      if(intersects.length > 0){
        const msg = pamReactions[Math.floor(Math.random() * pamReactions.length)];
        bubble.textContent = msg;
        bubble.classList.add('show');
        setTimeout(() => bubble.classList.remove('show'), 2500);
      }
    }
    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    // ------------------------------------------------------------------------------------------
        // PAM ANIMATION (mixer + fallback sway)
    // --
    // If GLB with animation, mixer handles it. Otherwise no-op.
    const pamArmL = null;

    // ------------------------------------------------------------------------------------------
    // ANIMATION LOOP
    // ------------------------------------------------------------------------------------------
    let clock = new THREE.Clock();

    function animate(){
      const delta = clock.getDelta();
      const time = clock.elapsedTime;

      // Walk
      updateWalk(delta);

      // Pam animation (mixer update)
      if(pam){
        if(pamMixer){
          pamMixer.update(delta);
        } else {
          // Fallback gentle sway for primitives
          const sway = Math.sin(time * 1.2) * 0.015;
          pam.position.x = -1.5 + sway;
        }
      }

      // Record player vinyl spin
      if(recordPlayer){
        const vinyl = recordPlayer.children.find(c => c.type === 'Mesh' && c.position.y > 0.06);
        if(vinyl) vinyl.rotation.y += delta * 2;
      }

      // Candle flame flicker
      scene.children.forEach(c => {
        if(c.material && c.material.color && c.material.color.getHex() === 0xff8833){
          c.position.y += Math.sin(time * 8 + c.position.x * 10) * 0.002;
        }
      });

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    // ------------------------------------------------------------------------------------------
    // RESIZE
    // ------------------------------------------------------------------------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Hide loading screen
    document.getElementById('loading').style.display = 'none';

    // Go!
    animate();
  </script>
</body>
</html>
