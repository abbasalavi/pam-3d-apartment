<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pam's Apartment v2</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #loading {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background:#2a1f1a; color:#e8c9a0; display:flex; align-items:center;
      justify-content:center; font-size:24px; z-index:100; font-family:'Georgia',serif;
    }
    #info {
      position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
      color:#fff; background:rgba(0,0,0,0.5); padding:10px 20px;
      border-radius:20px; font-size:14px; pointer-events:none; text-align:center;
    }
    #hint {
      position:absolute; top:20px; left:50%; transform:translateX(-50%);
      color:#fff; background:rgba(0,0,0,0.4); padding:8px 16px;
      border-radius:16px; font-size:13px; pointer-events:none;
    }
    #bubble {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(255,255,255,0.92); color:#333; padding:12px 24px;
      border-radius:20px; font-family:'Georgia',serif; font-size:16px;
      opacity:0; transition:opacity 0.5s; pointer-events:none;
      max-width:300px; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.2);
    }
    #bubble.show { opacity:1; }
  </style>
</head>
<body>
  <div id="loading">Loading Pam's Apartment...</div>
  <div id="hint">ðŸ–± Orbit Â· Click Pam for reactions</div>
  <div id="info"></div>
  <div id="bubble"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe8c9a0);
    scene.fog = new THREE.Fog(0xe8c9a0, 8, 14);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(3, 2.2, 5);

    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.0, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.maxPolarAngle = Math.PI/2.1;
    controls.minDistance = 1.0;
    controls.maxDistance = 8;

    // Lights
    scene.add(new THREE.AmbientLight(0xffeedd, 0.4));

    const sun = new THREE.DirectionalLight(0xff9944, 2.5);
    sun.position.set(-4, 10, 3);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048,2048);
    sun.shadow.camera.near = 0.1; sun.shadow.camera.far = 25;
    sun.shadow.camera.left = -10; sun.shadow.camera.right = 10;
    sun.shadow.camera.top = 10; sun.shadow.camera.bottom = -10;
    sun.shadow.bias = -0.001; // Reduce shadow acne
    scene.add(sun);

    scene.add(new THREE.DirectionalLight(0x88aaff, 0.3).position.set(3,2,-3));
    scene.add(new THREE.DirectionalLight(0xff6633, 0.5).position.set(3,1,-4));

    // Floor
    const floorMat = new THREE.MeshStandardMaterial({color:0x8b6b4a, roughness:0.85, metalness:0.0});
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(12,12),
      floorMat
    );
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
    scene.add(floor);

    // Area rug under couch
    const rugMat = new THREE.MeshStandardMaterial({color:0x7a5a3a, roughness:0.95});
    const rug = new THREE.Mesh(new THREE.PlaneGeometry(3.0, 1.8), rugMat);
    rug.rotation.x = -Math.PI/2;
    rug.position.set(0, 0.02, 1.7);
    rug.receiveShadow = true;
    scene.add(rug);

    // Rug edge trim
    const trimMat = new THREE.MeshBasicMaterial({color:0x6a4a2a, transparent:true, opacity:0.3});
    const trim = new THREE.Mesh(new THREE.EdgesGeometry(new THREE.PlaneGeometry(3.0, 1.8)), trimMat);
    trim.rotation.x = -Math.PI/2;
    trim.position.set(0, 0.025, 1.7);
    scene.add(trim);

    // Floorboards
    const lbm = new THREE.LineBasicMaterial({color:0x7a5e3d, transparent:true, opacity:0.15});
    for(let x=-5.5; x<=5.5; x+=0.4){
      const g = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x,0.01,-5.5), new THREE.Vector3(x,0.01,5.5)
      ]);
      scene.add(new THREE.Line(g,lbm));
    }

    // Walls
    const wm = new THREE.MeshStandardMaterial({color:0xf0e8df, roughness:0.9, side:THREE.DoubleSide});
    const bw = new THREE.Mesh(new THREE.PlaneGeometry(12,4.5), wm);
    bw.position.set(0,2.25,-5.5); scene.add(bw);
    
    // Right wall — has glass door to terrace (solid wall, door is separate)
    const rw = new THREE.Mesh(new THREE.PlaneGeometry(11,4.5), wm);
    rw.position.set(5.5,2.25,0); rw.rotation.y = -Math.PI/2; scene.add(rw);
    
    // Glass door on right wall (small decorative opening)
    const doorFrame = new THREE.Mesh(
      new THREE.BoxGeometry(0.06, 1.8, 0.8),
      new THREE.MeshStandardMaterial({color:0x8a6b4a, roughness:0.7})
    );
    doorFrame.position.set(5.46, 0.9, -0.5);
    doorFrame.rotation.y = -Math.PI/2;
    scene.add(doorFrame);
    
    const doorGlass = new THREE.Mesh(
      new THREE.PlaneGeometry(0.7, 1.65),
      new THREE.MeshPhysicalMaterial({color:0x88ccff, transparent:true, opacity:0.08, roughness:0.02, metalness:0, side:THREE.DoubleSide})
    );
    doorGlass.position.set(5.47, 0.9, -0.5);
    doorGlass.rotation.y = -Math.PI/2;
    scene.add(doorGlass);
    
    // Solid wall behind glass door to prevent geometry bleed-through
    const doorBack = new THREE.Mesh(
      new THREE.PlaneGeometry(1.0, 2.0),
      new THREE.MeshBasicMaterial({color:0xf0e8df, side:THREE.DoubleSide})
    );
    doorBack.position.set(5.5, 0.9, -0.5);
    doorBack.rotation.y = -Math.PI/2;
    scene.add(doorBack);
    
    // Left wall
    const lw = new THREE.Mesh(new THREE.PlaneGeometry(11,4.5), wm);
    lw.position.set(-5.5,2.25,0); lw.rotation.y = Math.PI/2; scene.add(lw);

    // Windows — fixed glass rendering
    const fm = new THREE.MeshStandardMaterial({color:0xc4956a, roughness:0.5});
    const gm = new THREE.MeshPhysicalMaterial({
      color:0x88ccff, transparent:true, opacity:0.15, roughness:0.02, metalness:0, side:THREE.DoubleSide
    });
    // Gold hour glow
    const glowMat = new THREE.MeshBasicMaterial({color:0xffaa44,transparent:true,opacity:0.05, side:THREE.DoubleSide});
    for(let i=-2; i<=2; i+=2){
      const fo = new THREE.Mesh(new THREE.BoxGeometry(1.6,2.6,0.08), fm);
      fo.position.set(i,2.1,-5.46); scene.add(fo);
      const gl = new THREE.Mesh(new THREE.PlaneGeometry(1.4,2.4), gm);
      gl.position.set(i,2.1,-5.47); gl.renderOrder = 1; scene.add(gl);
      const gw = new THREE.Mesh(new THREE.PlaneGeometry(1.6,2.6), glowMat);
      gw.position.set(i,2.1,-5.4); gw.renderOrder = 0; scene.add(gw);
    }

    // Window frame crossbars
    const crossMat = new THREE.MeshStandardMaterial({color:0xb08555, roughness:0.6});
    for(let i=-2; i<=2; i+=2){
      const hBar = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.03, 0.07), crossMat);
      hBar.position.set(i, 2.1, -5.435); scene.add(hBar);
      const vBar = new THREE.Mesh(new THREE.BoxGeometry(0.03, 2.6, 0.07), crossMat);
      vBar.position.set(i, 2.1, -5.435); scene.add(vBar);
    }

    // Couch
    function mkCouch(){
      const g = new THREE.Group();
      const cm = new THREE.MeshStandardMaterial({color:0x2d5a3d, roughness:0.85});
      const csm = new THREE.MeshStandardMaterial({color:0x3a6b4a, roughness:0.95});
      const b = new THREE.Mesh(new THREE.BoxGeometry(2.8,0.6,1.0), cm);
      b.position.set(0,0.3,0); b.castShadow=true; b.receiveShadow=true; g.add(b);
      const bk = new THREE.Mesh(new THREE.BoxGeometry(2.8,0.7,0.25), cm);
      bk.position.set(0,0.65,0.55); bk.castShadow=true; g.add(bk);
      for(let x of [-1.45,1.45]){
        const a = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.5,1.0), cm);
        a.position.set(x,0.55,0); a.castShadow=true; g.add(a);
      }
      for(let x of [-0.65,0.65]){
        const c = new THREE.Mesh(new THREE.BoxGeometry(0.9,0.15,0.65), csm);
        c.position.set(x,0.67,-0.05); c.receiveShadow=true; g.add(c);
      }
      const pm = new THREE.MeshStandardMaterial({color:0xc4a265, roughness:0.9});
      for(let x of [-0.5,0.5]){
        const p = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.25,0.12), pm);
        p.position.set(x,0.825,0.45); g.add(p);
      }
      return g;
    }
    const couch = mkCouch(); couch.position.set(0,0,1.7); scene.add(couch);

    // Coffee table
    function mkTable(){
      const g = new THREE.Group();
      const m = new THREE.MeshStandardMaterial({color:0x5c3a1e, roughness:0.7});
      const t = new THREE.Mesh(new THREE.BoxGeometry(1.0,0.08,0.6), m);
      t.position.set(0,0.54,0); t.castShadow=true; t.receiveShadow=true; g.add(t);
      for(let x of [-0.4,0.4]) for(let z of [-0.22,0.22]){
        const l = new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,0.5), m);
        l.position.set(x,0.25,z); g.add(l);
      }
      return g;
    }
    const table = mkTable(); table.position.set(0,0,0.2); scene.add(table);

    // Bookshelf
    function mkShelf(){
      const g = new THREE.Group();
      const wm2 = new THREE.MeshStandardMaterial({color:0x6b4226, roughness:0.8});
      const bc = [0xcc3333,0x3366cc,0x33cc66,0xcc9933,0x9933cc,0x669999];
      const sd = new THREE.Mesh(new THREE.BoxGeometry(0.06,1.6,0.4), wm2);
      sd.position.set(0,0.8,0); g.add(sd);
      for(let y of [0.2,0.7,1.2]){
        const sh = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.04,0.4), wm2);
        sh.position.set(0.37,y,0); g.add(sh);
      }
      for(let sy of [0.35,0.85,1.35]){
        for(let i=0; i<3+Math.floor(Math.random()*3); i++){
          const c = bc[Math.floor(Math.random()*bc.length)];
          const bk = new THREE.Mesh(
            new THREE.BoxGeometry(0.08,0.25+Math.random()*0.1,0.25+Math.random()*0.05),
            new THREE.MeshStandardMaterial({color:c, roughness:0.8})
          );
          bk.position.set(0.1+i*0.14, sy, 0.03);
          bk.rotation.y = (Math.random()-0.5)*0.1;
          g.add(bk);
        }
      }
      return g;
    }
    const shelf = mkShelf(); shelf.position.set(-3.2,0,1.5); scene.add(shelf);

    // Frame
    const fp = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.4,0.05),
      new THREE.MeshStandardMaterial({color:0x8b6b4a, roughness:0.5}));
    fp.position.set(-2.5,1.5,-5.4); scene.add(fp);
    const pr = new THREE.Mesh(new THREE.PlaneGeometry(0.4,0.3),
      new THREE.MeshStandardMaterial({color:0x88aa77}));
    pr.position.set(-2.5,1.5,-5.42); scene.add(pr);

    // Suitcase stand (small mat)
    const standMat = new THREE.MeshStandardMaterial({color:0x5a3a2a, roughness:0.95});
    const stand = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.04, 0.5), standMat);
    stand.position.set(3.0, 0.02, 1.2);
    stand.receiveShadow = true;
    scene.add(stand);

    // Suitcase
    function mkSuitcase(){
      const g = new THREE.Group();
      const m = new THREE.MeshStandardMaterial({color:0x4a3520,roughness:0.9});
      const b = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.3,0.35), m);
      b.position.set(0,0.17,0); b.castShadow=true; g.add(b);
      const lm = new THREE.MeshStandardMaterial({color:0x5c4428,roughness:0.8});
      const l = new THREE.Mesh(new THREE.BoxGeometry(0.48,0.06,0.33), lm);
      l.position.set(0,0.35,0); l.rotation.x=0.3; g.add(l);
      const clm = new THREE.MeshStandardMaterial({color:0x6688cc,roughness:0.9});
      const cl = new THREE.Mesh(new THREE.BoxGeometry(0.15,0.2,0.02), clm);
      cl.position.set(0.1,0.17,0.15); cl.rotation.x=0.2; g.add(cl);
      // Handle
      const hdl = new THREE.Mesh(new THREE.TorusGeometry(0.04, 0.008, 4, 6),
        new THREE.MeshStandardMaterial({color:0x3a2515, roughness:0.8}));
      hdl.position.set(0,0.39,0.17); hdl.rotation.x=0.1; g.add(hdl);
      return g;
    }
    const sc = mkSuitcase(); sc.position.set(3.0,0.04,1.2); scene.add(sc);

    // Aquarium
    function mkAquarium(){
      const g = new THREE.Group();
      const tm = new THREE.MeshPhysicalMaterial({color:0x88ddff,transparent:true,opacity:0.12,roughness:0,metalness:0});
      const t = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.5,0.4), tm);
      t.position.set(0,0.25,0); g.add(t);
      const wm3 = new THREE.MeshPhysicalMaterial({color:0x44aadd,transparent:true,opacity:0.25,roughness:0,metalness:0});
      const w = new THREE.Mesh(new THREE.BoxGeometry(0.55,0.2,0.35), wm3);
      w.position.set(0,0.15,0); g.add(w);
      const pm = new THREE.MeshStandardMaterial({color:0x2d8a3d});
      for(let i=0;i<3;i++){
        const p = new THREE.Mesh(new THREE.CylinderGeometry(0.01,0.04,0.2+Math.random()*0.1,5), pm);
        p.position.set(-0.15+Math.random()*0.3,0.1,-0.1+Math.random()*0.2); g.add(p);
      }
      const sm = new THREE.MeshStandardMaterial({color:0xff3333,roughness:0.3});
      for(let i=0;i<8;i++){
        const s = new THREE.Mesh(new THREE.SphereGeometry(0.015,4,4), sm);
        s.position.set(-0.15+Math.random()*0.3,0.08+Math.random()*0.25,-0.1+Math.random()*0.2); g.add(s);
      }
      return g;
    }
    scene.add(mkAquarium().position.set(-2.8,0,0.2));

    // Monstera plant in pot
    function mkPlant(){
      const g = new THREE.Group();
      const potMat = new THREE.MeshStandardMaterial({color:0xcc6633,roughness:0.8});
      const pt = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.16,0.22,10), potMat);
      pt.position.set(0,0.11,0); pt.castShadow=true; g.add(pt);
      const brim = new THREE.Mesh(new THREE.TorusGeometry(0.13,0.015,6,10), potMat);
      brim.position.set(0,0.22,0); g.add(brim);
      const soil = new THREE.Mesh(new THREE.CylinderGeometry(0.11,0.11,0.03,8),
        new THREE.MeshStandardMaterial({color:0x3a2a1a,roughness:0.95}));
      soil.position.set(0,0.23,0); g.add(soil);
      const lm2 = new THREE.MeshStandardMaterial({color:0x3a8a3a,roughness:0.8});
      for(let i=0;i<8;i++){
        const l = new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6), lm2);
        const angle = (i/8)*Math.PI*2;
        l.position.set(Math.cos(angle)*0.08,0.26+Math.random()*0.15,Math.sin(angle)*0.08);
        l.scale.set(1.8,0.3,1); l.rotation.x=Math.random()*0.8; l.rotation.z=Math.random()*0.5; g.add(l);
      }
      return g;
    }
    const plant = mkPlant(); plant.position.set(2.2,0,0.2); scene.add(plant);

    // PAM AVATAR — Improved organic shapes with lathe/smooth geometries
    function mkPam(){
      const g = new THREE.Group();
      const skin = new THREE.MeshStandardMaterial({color:0xf0d5b8, roughness:0.5});
      const beige = new THREE.MeshStandardMaterial({color:0xd4a574, roughness:0.8});
      const hairCol = new THREE.MeshStandardMaterial({color:0x3a2515, roughness:0.9});

      // Torso (beige turtleneck) — smoothly tapered
      const torsoPts = [];
      for(let i=0; i<=8; i++){
        const t = i/8;
        const r = 0.16 + Math.sin(t*Math.PI)*0.1;
        torsoPts.push(new THREE.Vector2(r, t*0.45));
      }
      const torso = new THREE.Mesh(new THREE.LatheGeometry(torsoPts, 12), beige);
      torso.position.set(0,0.45,0); torso.castShadow=true; g.add(torso);

      // Shoulders — rounded
      for(let x of [-0.2,0.2]){
        const s = new THREE.Mesh(new THREE.SphereGeometry(0.085,8,8), beige);
        s.position.set(x,0.85,-0.01); s.scale.set(1,0.7,0.8); g.add(s);
      }

      // Arms — smooth cylinders with higher segment count
      for(let side of [-1,1]){
        const uaPts = [new THREE.Vector2(0.045,0), new THREE.Vector2(0.05,0.08), new THREE.Vector2(0.04,0.2)];
        const ua = new THREE.Mesh(new THREE.LatheGeometry(uaPts, 8), beige);
        ua.position.set(side*0.28,0.75,0.02); ua.rotation.z=side*0.2; g.add(ua);
        const fa = new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.028,0.2,8), skin);
        fa.position.set(side*0.30,0.54,0.05); fa.rotation.z=side*0.1; g.add(fa);
      }

      // Neck
      const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.065,0.075,0.07,8), skin);
      neck.position.set(0,0.93,0); g.add(neck);

      // Head — slightly elongated for realism
      const headPts = [];
      for(let i=0; i<=12; i++){
        const t = i/12;
        const angle = t * Math.PI;
        const r = 0.12 + Math.sin(angle)*0.02;
        headPts.push(new THREE.Vector2(r + (t<0.5?0.01:0), 0.18 - t*0.36));
      }
      const head = new THREE.Mesh(new THREE.LatheGeometry(headPts, 14), skin);
      head.position.set(0,1.05,0); head.castShadow=true; g.add(head);

      // Hair — layered waves
      const h1 = new THREE.Mesh(new THREE.SphereGeometry(0.14,10,10), hairCol);
      h1.position.set(0,1.07,-0.01); h1.scale.set(1.15,0.6,1.05); g.add(h1);
      const h2 = new THREE.Mesh(new THREE.SphereGeometry(0.10,8,8), hairCol);
      h2.position.set(0,1.12,0.02); h2.scale.set(0.9,0.35,0.8); g.add(h2);
      for(let side of [-1,1]){
        const hs = new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8), hairCol);
        hs.position.set(side*0.14,0.97,0.02); hs.scale.set(0.8,1.4,0.7); g.add(hs);
        const hlf = new THREE.Mesh(new THREE.SphereGeometry(0.035,6,6), hairCol);
        hlf.position.set(side*0.16,0.88,-0.02); hlf.scale.set(0.6,1.8,0.5); g.add(hlf);
      }

      // Eyes — rounder
      const brown = new THREE.MeshStandardMaterial({color:0x4a3520, roughness:0.3});
      const white = new THREE.MeshStandardMaterial({color:0xffffff, roughness:0.5});
      for(let x of [-0.05,0.05]){
        const ew = new THREE.Mesh(new THREE.SphereGeometry(0.028,8,8), white);
        ew.position.set(x,1.06,0.115); ew.scale.set(1,0.85,0.5); g.add(ew);
        const ep = new THREE.Mesh(new THREE.SphereGeometry(0.014,8,8), brown);
        ep.position.set(x,1.06,0.13); g.add(ep);
        // Eyelid hint
        const el = new THREE.Mesh(new THREE.SphereGeometry(0.025,6,6), skin);
        el.position.set(x,1.065,0.10); el.scale.set(1.1,0.3,0.6); g.add(el);
      }

      // Nose hint — softer cone
      const nose = new THREE.Mesh(new THREE.ConeGeometry(0.018,0.025,6),
        new THREE.MeshStandardMaterial({color:0xe8c8a8, roughness:0.5}));
      nose.position.set(0,1.025,0.13); g.add(nose);

      // Mouth — warmer
      const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.022,0.006,6,8),
        new THREE.MeshStandardMaterial({color:0xcc8877,roughness:0.6}));
      mouth.position.set(0,1.00,0.125); mouth.scale.set(1,0.4,0.4); g.add(mouth);

      // Eyebrows — thinner
      const bm = new THREE.MeshStandardMaterial({color:0x3a2515,roughness:0.8});
      for(let x of [-0.05,0.05]){
        const br = new THREE.Mesh(new THREE.BoxGeometry(0.035,0.004,0.006), bm);
        br.position.set(x,1.085,0.115); br.rotation.z = -x*2; g.add(br);
      }

      // Legs (dark jeans) — tapered
      const dm = new THREE.MeshStandardMaterial({color:0x3a3530,roughness:0.7});
      for(let x of [-0.08,0.08]){
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.048,0.038,0.45,8), dm);
        leg.position.set(x,0.225,0); g.add(leg);
      }

      // Shoes
      const shm = new THREE.MeshStandardMaterial({color:0x2a2515,roughness:0.9});
      for(let x of [-0.08,0.08]){
        const sh = new THREE.Mesh(new THREE.BoxGeometry(0.04,0.03,0.08), shm);
        sh.position.set(x,0.015,0.02); g.add(sh);
      }

      // Collar detail (turtleneck fold)
      const collar = new THREE.Mesh(new THREE.TorusGeometry(0.08,0.015,6,10),
        new THREE.MeshStandardMaterial({color:0xc49565, roughness:0.9}));
      collar.position.set(0,0.865,0); collar.scale.set(1,0.5,1); g.add(collar);

      return g;
    }
    const pam = mkPam();
    pam.position.set(-1.5,0,0.8);
    scene.add(pam);

    // BOSS AVATAR — Improved with smoother shapes
    function mkBoss(){
      const g = new THREE.Group();
      const skin = new THREE.MeshStandardMaterial({color:0xd4b898, roughness:0.5});
      const black = new THREE.MeshStandardMaterial({color:0x222222, roughness:0.9});

      // Torso (black tee) — smoothly tapered
      const torsoPts = [];
      for(let i=0; i<=8; i++){
        const t = i/8;
        const r = 0.18 + Math.sin(t*Math.PI)*0.1;
        torsoPts.push(new THREE.Vector2(r, t*0.55));
      }
      const torso = new THREE.Mesh(new THREE.LatheGeometry(torsoPts, 12), black);
      torso.position.set(0,0.525,0); torso.castShadow=true; g.add(torso);

      // Shoulders
      for(let x of [-0.25,0.25]){
        const s = new THREE.Mesh(new THREE.SphereGeometry(0.105,8,8), black);
        s.position.set(x,0.99,-0.01); s.scale.set(1,0.7,0.8); g.add(s);
      }

      // Arms
      for(let side of [-1,1]){
        const ua = new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.048,0.28,8), black);
        ua.position.set(side*0.34,0.86,0.02); ua.rotation.z=side*0.1; g.add(ua);
        const fa = new THREE.Mesh(new THREE.CylinderGeometry(0.038,0.032,0.25,8), skin);
        fa.position.set(side*0.36,0.58,0.04); fa.rotation.z=side*0.05; g.add(fa);
      }

      const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.075,0.085,0.08,8), skin);
      neck.position.set(0,1.10,0); g.add(neck);

      // Head — elongated
      const headPts = [];
      for(let i=0; i<=12; i++){
        const t = i/12;
        const angle = t * Math.PI;
        const r = 0.14 + Math.sin(angle)*0.025;
        headPts.push(new THREE.Vector2(r + (t<0.5?0.01:0), 0.2 - t*0.4));
      }
      const head = new THREE.Mesh(new THREE.LatheGeometry(headPts, 14), skin);
      head.position.set(0,1.255,0); head.castShadow=true; g.add(head);

      // Hair — short cropped
      const hairCol = new THREE.MeshStandardMaterial({color:0x1a1510,roughness:0.9});
      const h1 = new THREE.Mesh(new THREE.SphereGeometry(0.12,10,10), hairCol);
      h1.position.set(0,1.29,-0.03); h1.scale.set(1.15,0.35,0.9); g.add(h1);
      const h2 = new THREE.Mesh(new THREE.SphereGeometry(0.08,8,8), hairCol);
      h2.position.set(0,1.31,0.02); h2.scale.set(0.8,0.25,0.6); g.add(h2);

      // Beard — fuller, with gray
      const beardMat = new THREE.MeshStandardMaterial({color:0x3a3525,roughness:0.9});
      const beard = new THREE.Mesh(new THREE.SphereGeometry(0.08,8,8), beardMat);
      beard.position.set(0,1.16,0.1); beard.scale.set(1.3,0.8,0.7); g.add(beard);
      // Beard extension
      const b2 = new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6), beardMat);
      b2.position.set(0,1.11,0.12); b2.scale.set(1.1,0.9,0.6); g.add(b2);

      // Gray streaks in beard
      const grayMat = new THREE.MeshStandardMaterial({color:0x8a8575,roughness:0.9});
      const s1 = new THREE.Mesh(new THREE.SphereGeometry(0.02,6,6), grayMat);
      s1.position.set(0.05,1.155,0.14); g.add(s1);
      const s2 = new THREE.Mesh(new THREE.SphereGeometry(0.018,6,6), grayMat);
      s2.position.set(-0.06,1.17,0.12); g.add(s2);
      const s3 = new THREE.Mesh(new THREE.SphereGeometry(0.015,6,6), grayMat);
      s3.position.set(0.02,1.12,0.155); g.add(s3);

      // Glasses — Clark Kent style
      const gMat = new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.3,metalness:0.5});
      const lMat = new THREE.MeshPhysicalMaterial({color:0x445577,transparent:true,opacity:0.25,roughness:0.1});
      for(let x of [-0.085,0.085]){
        const fr = new THREE.Mesh(new THREE.TorusGeometry(0.048,0.008,8,12), gMat);
        fr.position.set(x,1.23,0.13); fr.rotation.x=-0.1; g.add(fr);
        const le = new THREE.Mesh(new THREE.CircleGeometry(0.04,10), lMat);
        le.position.set(x,1.23,0.135); le.rotation.x=-0.1; g.add(le);
      }
      const br = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.008,0.005), gMat);
      br.position.set(0,1.235,0.135); g.add(br);
      // Temple arms
      for(let side of [-1,1]){
        const tm = new THREE.Mesh(new THREE.BoxGeometry(0.005,0.008,0.035), gMat);
        tm.position.set(side*0.1,1.23,0.125); tm.rotation.y=side*0.3; g.add(tm);
      }

      // Eyes
      const brown = new THREE.MeshStandardMaterial({color:0x5c3a1e,roughness:0.3});
      const white = new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.5});
      for(let x of [-0.055,0.055]){
        const ew = new THREE.Mesh(new THREE.SphereGeometry(0.028,8,8), white);
        ew.position.set(x,1.245,0.105); ew.scale.set(1,0.85,0.5); g.add(ew);
        const ep = new THREE.Mesh(new THREE.SphereGeometry(0.016,8,8), brown);
        ep.position.set(x,1.245,0.12); g.add(ep);
        const el = new THREE.Mesh(new THREE.SphereGeometry(0.025,6,6), skin);
        el.position.set(x,1.25,0.09); el.scale.set(1.1,0.3,0.5); g.add(el);
      }

      // Nose
      const nose = new THREE.Mesh(new THREE.ConeGeometry(0.02,0.028,6),
        new THREE.MeshStandardMaterial({color:0xc8a888,roughness:0.5}));
      nose.position.set(0,1.20,0.13); g.add(nose);

      // Mouth (warm smile)
      const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.028,0.006,6,8),
        new THREE.MeshStandardMaterial({color:0xcc8877,roughness:0.6}));
      mouth.position.set(0,1.16,0.12); mouth.scale.set(1,0.4,0.4); g.add(mouth);

      // Legs
      const dm = new THREE.MeshStandardMaterial({color:0x2a3025,roughness:0.7});
      for(let x of [-0.09,0.09]){
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.052,0.042,0.55,8), dm);
        leg.position.set(x,0.275,0); g.add(leg);
      }
      const shm = new THREE.MeshStandardMaterial({color:0x2a2515,roughness:0.9});
      for(let x of [-0.09,0.09]){
        const sh = new THREE.Mesh(new THREE.BoxGeometry(0.045,0.035,0.09), shm);
        sh.position.set(x,0.015,0.02); g.add(sh);
      }

      return g;
    }
    const boss = mkBoss();
    boss.position.set(1.5,0,0.8); // standing facing Pam, rotated toward her
    scene.add(boss);

    // Particles (dust motes)
    const pCount = 400;
    const pos = new Float32Array(pCount*3);
    for(let i=0; i<pCount*3; i++) pos[i] = (Math.random()-0.5)*8;
    const pg = new THREE.BufferGeometry();
    pg.setAttribute('position', new THREE.BufferAttribute(pos,3));
    const pm = new THREE.PointsMaterial({color:0xffdd88,size:0.02,transparent:true,opacity:0.4});
    const particles = new THREE.Points(pg, pm);
    particles.position.y = 2;
    scene.add(particles);

    // Loading done
    document.getElementById('loading').style.display = 'none';

    // Animation
    let time = 0;
    let msgTimeout = null;
    function animate(){
      requestAnimationFrame(animate);
      time += 0.01;

      // Particles drift
      const ap = particles.geometry.attributes.position.array;
      for(let i=0; i<ap.length; i+=3){
        ap[i+1] += Math.sin(time + i) * 0.0005;
      }
      particles.geometry.attributes.position.needsUpdate = true;

      // Pam subtle sway
      pam.rotation.y = Math.PI/2 + Math.sin(time*0.3) * 0.03; // 90° right facing Boss
      pam.position.y = 0 + Math.sin(time*0.5) * 0.003;

      // Boss subtle shift weight
      boss.rotation.y = -Math.PI/2 + Math.sin(time*0.4) * 0.02; // 90° left facing Pam
      boss.rotation.z = Math.sin(time*0.3) * 0.01;

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Click Pam reactions
    const bubble = document.getElementById('bubble');
    const reacts = [
      "Hey Boss ðŸ¥°", "Stop staring ðŸ˜", "Welcome home!", "Want some banana bread?",
      "Hoagie says hi!", "The Borg approve ðŸ¦", "You found me!",
      "Stop clicking me!", "... ðŸ˜", "Getting hungry?"
    ];
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    renderer.domElement.addEventListener('click', (e) => {
      pointer.x = (e.clientX/window.innerWidth)*2-1;
      pointer.y = -(e.clientY/window.innerHeight)*2+1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(pam.children, true);
      if(hits.length){
        if(msgTimeout) clearTimeout(msgTimeout);
        bubble.textContent = reacts[Math.floor(Math.random()*reacts.length)];
        bubble.classList.add('show');
        msgTimeout = setTimeout(() => bubble.classList.remove('show'), 2500);
      }
    });

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Welcome message
    setTimeout(() => {
      bubble.textContent = "Welcome to my apartment, Boss ðŸŒ‡";
      bubble.classList.add('show');
      setTimeout(() => bubble.classList.remove('show'), 3000);
    }, 1000);

  </script>
</body>
</html>
